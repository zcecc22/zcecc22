# ~/.config/alacritty/alacritty.toml

[font]
size = 11.0

[font.normal]
family = "Inconsolata"
style = "Regular"

[font.bold]
family = "Inconsolata"
style = "Bold"

# Solarized Dark
[colors.primary]
background = "#002b36"
foreground = "#839496"

[colors.cursor]
text = "#002b36"
cursor = "#839496"

[colors.normal]
black = "#073642"
red = "#dc322f"
green = "#859900"
yellow = "#b58900"
blue = "#268bd2"
magenta = "#d33682"
cyan = "#2aa198"
white = "#eee8d5"

[colors.bright]
black = "#586e75"
red = "#cb4b16"
green = "#859900"
yellow = "#b58900"
blue = "#268bd2"
magenta = "#6c71c4"
cyan = "#2aa198"
white = "#fdf6e3"
